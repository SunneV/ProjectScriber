name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for auto-commit

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Run pre-commit hooks
        id: precommit
        run: uv run pre-commit run --all-files

      - name: Check README sync
        run: uv run python scripts/sync_readme.py --check

      - name: Auto-commit formatting fixes
        if: failure()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix formatting and linting issues"
          commit_options: "--no-verify"
          # Fail the job even if we commit so the user knows they need to pull

      - name: Fail if pre-commit failed
        if: steps.precommit.outcome == 'failure'
        run: exit 1

  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    needs: lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        env:
          TAR: ${{ matrix.os == 'windows-latest' && 'C:\Windows\System32\tar.exe' || 'tar' }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync
        run: uv sync --all-extras

      - name: Check native import
        run: uv run python -c "import scriber._native; print('native ok')"

      - name: Rust tests
        run: cargo test

      - name: Run tests
        run: uv run pytest

      - name: CLI smoke
        run: uv run scriber . --only-tree --output -
